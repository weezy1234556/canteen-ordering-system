<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Item | Canteen Food Ordering System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Admin Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="manage-items.html">Manage Items</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin-orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="admin-logout-btn" href="#">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0">Add New Food Item</h3>
                    </div>
                    <div class="card-body">
                        <form id="add-item-form">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="item-name" class="form-label">Item Name</label>
                                    <input type="text" class="form-control" id="item-name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="item-category" class="form-label">Category</label>
                                    <select class="form-select" id="item-category" required>
                                        <option value="">Select Category</option>
                                        <option value="breakfast">Breakfast</option>
                                        <option value="lunch">Lunch</option>
                                        <option value="dinner">Dinner</option>
                                        <option value="beverages">Beverages</option>
                                        <option value="snacks">Snacks</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="item-price" class="form-label">Price ($)</label>
                                    <input type="number" class="form-control" id="item-price" step="0.01" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="item-status" class="form-label">Status</label>
                                    <select class="form-select" id="item-status" required>
                                        <option value="available">Available</option>
                                        <option value="unavailable">Unavailable</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="item-description" class="form-label">Description</label>
                                <textarea class="form-control" id="item-description" rows="3" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="item-image" class="form-label">Image</label>
                                <input type="file" class="form-control" id="item-image" required>
                                <div class="mt-2">
                                    <img id="item-image-preview" src="" alt="Item Preview" class="img-thumbnail" style="max-height: 200px; display: none;">
                                </div>
                            </div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="manage-items.html" class="btn btn-secondary me-md-2">Cancel</a>
                                <button type="submit" class="btn btn-success">Add Item</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>Canteen Food Ordering System</h5>
                    <p>Admin Management Portal</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p>&copy; 2025 Canteen Food Ordering System. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/add-item.js"></script>
</body>
</html>
